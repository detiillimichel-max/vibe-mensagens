<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIO ONE - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { justify-content: center; align-items: center; background: radial-gradient(circle, #111, #000); display: flex; height: 100vh; margin: 0; }
        .login-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 85%; max-width: 350px; }
        h2 { color: #1a73e8; margin-bottom: 20px; font-family: sans-serif; }
        input { width: 100%; margin-bottom: 15px; box-sizing: border-box; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        button { width: 100%; padding: 12px; background: #1a73e8; border: none; color: white; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>OIO ONE</h2>
        <input type="email" id="email" placeholder="Seu e-mail ou nome">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="entrarAgora()">Entrar</button>
    </div>

    <script>
        function entrarAgora() {
            const campo = document.getElementById('email').value;
            if(campo) {
                // Pega o nome e limpa (ex: michel@vibe vira michel)
                const nomeParaSalvar = campo.split('@')[0];
                localStorage.setItem("vibe_user", nomeParaSalvar);
                alert("Bem-vindo ao OIO ONE, " + nomeParaSalvar + "!");
                window.location.href = "index.html";
            } else {
                alert("Por favor, digite seu nome ou e-mail.");
            }
        }
    </script>
</body>
</html>
