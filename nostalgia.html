<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia - OIO ONE 📺</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        /* Botão Voltar Azul Google */
        .btn-voltar { 
            position: fixed; top: 20px; left: 20px; 
            background: #4285F4; color: white; padding: 10px 20px; 
            border-radius: 50px; border: none; font-weight: bold; z-index: 100;
        }

        /* Moldura de TV (Esconde a "sujeira" do YouTube) */
        .tv-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #000; position: relative;
        }

        /* O vídeo ocupa a tela toda, mas escondemos as bordas com o iframe */
        iframe {
            width: 100%; height: 100%;
            border: none; pointer-events: auto;
        }

        .overlay-protecao {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 50; pointer-events: none;
        }
    </style>
</head>
<body>

    <button class="btn-voltar" onclick="window.location.href='index.html'">← VOLTAR</button>
    <div class="overlay-protecao"></div>

    <div class="tv-container" id="player">
        <iframe 
            src="https://www.youtube.com/embed/videoseries?list=PL_Xv5U5-GZ6oH1f0fQZfV9Z8pU_WzYy0Z&autoplay=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

    <script src="apps/ehub_logic.js"></script>
</body>
</html>
