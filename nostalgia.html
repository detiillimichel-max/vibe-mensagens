<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia - OIO ONE 📺</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; text-align: center; overflow: hidden; }
        
        .btn-voltar { 
            position: fixed; top: 20px; left: 20px; 
            background: #4285F4; color: white; padding: 10px 20px; 
            border-radius: 50px; border: none; font-weight: bold; z-index: 100;
        }

        /* Menu de Escolha */
        .menu-nostalgia {
            display: flex; flex-direction: column; height: 100vh;
            justify-content: center; align-items: center; gap: 30px;
        }

        .opcao-card {
            width: 80%; background: rgba(255,255,255,0.1);
            padding: 40px; border-radius: 20px; border: 2px solid #4285F4;
            font-size: 24px; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.3s;
        }

        /* Player que ocupa tudo */
        #player-full {
            display: none; width: 100vw; height: 100vh; background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <button class="btn-voltar" onclick="voltarOuFechar()">← VOLTAR</button>

    <div id="menu-inicial" class="menu-nostalgia">
        <h2 style="color: #4285F4;">O que vamos recordar? 😊</h2>
        <div class="opcao-card" onclick="carregarVideo('PL_Xv5U5-GZ6oH1f0fQZfV9Z8pU_WzYy0Z')">
            🎬 FILMES ANTIGOS
        </div>
        <div class="opcao-card" onclick="carregarVideo('PLX4_S_H_Z6Zf_kYh-gL6-2D6-jR5XvA7W')">
            🧸 DESENHOS CLÁSSICOS
        </div>
    </div>

    <div id="player-full">
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        function carregarVideo(idPlaylist) {
            const player = document.getElementById('player-full');
            const menu = document.getElementById('menu-inicial');
            const frame = document.getElementById('video-frame');

            // Esconde menu e mostra player
            menu.style.display = 'none';
            player.style.display = 'block';

            // Carrega a playlist sem controles e sem logos
            frame.src = `https://www.youtube.com/embed/videoseries?list=${idPlaylist}&autoplay=1&controls=1&modestbranding=1&rel=0`;
            
            if(typeof tocarSom === 'function') tocarSom('clique');
        }

        function voltarOuFechar() {
            const player = document.getElementById('player-full');
            if (player.style.display === 'block') {
                location.reload(); // Volta para a escolha
            } else {
                window.location.href = 'index.html'; // Volta para o chat
            }
        }
    </script>

    <script src="apps/ehub_logic.js"></script>
</body>
</html>
