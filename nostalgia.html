<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia - OIO ONE 📺</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #1a1a1a; color: white; text-align: center; padding-top: 50px; }
        .btn-voltar { 
            position: fixed; top: 20px; left: 20px; 
            background: #4285F4; color: white; padding: 10px 20px; 
            border-radius: 50px; border: none; font-weight: bold;
        }
        .container-desenhos { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .box-tv { width: 150px; height: 150px; background: #333; border: 5px solid #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    </style>
</head>
<body>

    <button class="btn-voltar" onclick="window.location.href='index.html'">← VOLTAR</button>

    <h2>📺 Sala de Nostalgia</h2>
    <p>Escolha um clássico para recordar:</p>

    <div class="container-desenhos">
        <div class="box-tv" onclick="window.open('https://www.youtube.com/results?search_query=desenhos+anos+80+90', '_blank')">📺</div>
        <div class="box-tv" onclick="window.open('https://www.youtube.com/results?search_query=filmes+antigos+completos', '_blank')">🎞️</div>
    </div>

    <script src="apps/ehub_logic.js"></script>
</body>
</html>
