<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Mensagens</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Área de Chat */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at top, #111, #000); }

        /* Balão com Blur Cristalino (Mais transparente) */
        .balao { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(5px); 
            padding: 12px 16px; 
            border-radius: 18px; 
            max-width: 80%; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 15px;
            line-height: 1.4;
        }

        /* Barra Inferior com o SEU AZUL (#1a73e8) */
        .barra { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            background: #000; border-top: 1px solid #222; padding-bottom: 35px; 
        }
        .icon { color: #1a73e8; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .icon:active { transform: scale(0.8); }
        
        input { 
            flex: 1; background: #1a1a1a; border: 1px solid #333; 
            color: #fff; padding: 12px 20px; border-radius: 30px; outline: none;
        }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div class="barra">
        <i class="fa-solid fa-camera icon"></i>
        <i class="fa-solid fa-microphone icon"></i>
        <input type="text" id="msgInput" placeholder="Sua vibe..." autocomplete="off">
        <i class="fa-solid fa-paper-plane icon" id="btnEnviar"></i>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbItrAXq7Y",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("chat_vibe");
        let nick = prompt("Seu nome:") || "Michel";

        function enviar() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                db.push({ autor: nick, texto: input.value, data: Date.now() });
                input.value = "";
            }
        }

        document.getElementById('btnEnviar').onclick = enviar;
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        db.limitToLast(20).on("child_added", snap => {
            const m = snap.val();
            const div = document.createElement("div");
            div.className = "balao";
            div.style.alignSelf = m.autor === nick ? "flex-end" : "flex-start";
            div.innerHTML = `<strong>${m.autor}</strong><br>${m.texto}`;
            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
        });
    </script>
</body>
</html>
