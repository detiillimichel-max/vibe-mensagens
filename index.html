<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vibe OIO">
    <link rel="manifest" href="./manifest.json">
    <title>Vibe - OIO ONE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/vibe-chat.css">

    <style>
        #vibe-overlay-molecular {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(11, 14, 17, 0.7); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #vibe-overlay-molecular.ativo { opacity: 1; pointer-events: all; }

        .molecula-container {
            position: relative; width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
        }

        /* O Núcleo */
        .molecula-centro {
            width: 100px; height: 100px; border-radius: 50%; z-index: 10;
            background: #101525; border: 2px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.2), inset 0 0 20px rgba(0,0,0,0.8);
            object-fit: cover; cursor: pointer; transition: transform 0.2s;
        }
        .molecula-centro:active { transform: scale(0.92); box-shadow: 0 0 60px rgba(0, 229, 255, 0.5); }

        /* Os Elétrons */
        .eletron {
            position: absolute; width: 55px; height: 55px;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: #00e5ff; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .eletron:active { background: rgba(0, 229, 255, 0.15); border-color: #00e5ff; transform: scale(1.1); }

        /* Posições sem linhas (130px de distância do centro) */
        .el-1 { transform: rotate(0deg) translate(130px) rotate(0deg); }      /* Direita */
        .el-2 { transform: rotate(60deg) translate(130px) rotate(-60deg); }   /* Baixo Dir */
        .el-3 { transform: rotate(120deg) translate(130px) rotate(-120deg); } /* Baixo Esq */
        .el-4 { transform: rotate(180deg) translate(130px) rotate(-180deg); } /* Esquerda */
        .el-5 { transform: rotate(240deg) translate(130px) rotate(-240deg); } /* Cima Esq */
        .el-6 { transform: rotate(300deg) translate(130px) rotate(-300deg); } /* Cima Dir */

        /* Botão Flutuante (O "Átomo" que abre o menu) */
        #btn-abrir-molecula {
            position: fixed; bottom: 85px; right: 20px;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(26, 115, 232, 0.9); backdrop-filter: blur(5px);
            color: white; border: 1px solid rgba(255,255,255,0.2); font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 9000; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div class="barra">
        <i class="fa-solid fa-camera icon" id="btnFoto"></i>
        <i class="fa-solid fa-microphone icon" id="btnAudio"></i>
        <input type="text" id="msgInput" placeholder="Sua vibe..." autocomplete="off">
        <i class="fa-solid fa-plus icon" onclick="abrirGaveta()"></i>
        <i class="fa-solid fa-paper-plane icon" id="btnEnviar"></i>
    </div>

    <button id="btn-abrir-molecula" onclick="abrirMolecula()">
        <i class="fa-solid fa-atom"></i>
    </button>

    <div id="vibe-overlay-molecular" onclick="fecharMolecula(event)">
        <div class="molecula-container">
            <img id="img-nucleo" src="https://ui-avatars.com/api/?name=OIO&background=101525&color=fff" alt="Você" class="molecula-centro" onclick="alert('Seu Perfil Central!')">

            <div class="eletron el-1" onclick="fecharMoleculaDireto()"><i class="fa-solid fa-comment-dots"></i></div>
            
            <div class="eletron el-2" onclick="fecharMoleculaDireto(); abrirGaveta();"><i class="fa-solid fa-layer-group"></i></div>
            
            <div class="eletron el-3" onclick="fecharMoleculaDireto(); galeriaHub();"><i class="fa-solid fa-images"></i></div>
            
            <div class="eletron el-4" onclick="fecharMoleculaDireto(); ativarIAVibe();"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            
            <div class="eletron el-5" onclick="fecharMoleculaDireto(); abrirAppHub('video_call');"><i class="fa-solid fa-phone"></i></div>
            
            <div class="eletron el-6" onclick="fecharMoleculaDireto(); abrirAppHub('jogos');"><i class="fa-solid fa-gamepad"></i></div>
        </div>
    </div>

    <div id="gaveta-ehub" class="gaveta-container">
        <div class="handle-area" onclick="fecharGaveta()">
            <div class="handle-bar"></div>
        </div>
        <div class="gaveta-content">
            <h3 style="color:#1a73e8; margin-bottom:20px;">e-Hub OIO ONE</h3>
            <div class="grid-apps">
                <div class="app-item" onclick="galeriaHub()">
                    <i class="fa-solid fa-images"></i>
                    <span>Galeria</span>
                </div>
                <div class="app-item" onclick="abrirAppHub('google')">
                    <i class="fa-brands fa-google"></i>
                    <span>Google</span>
                </div>
                <div class="app-item" onclick="abrirAppHub('toc_azul')">
                    <i class="fa-solid fa-video" style="color:#007bff;"></i>
                    <span>Toc Videos</span>
                </div>
                <div class="app-item" onclick="abrirAppHub('jogos')">
                    <i class="fa-solid fa-gamepad" style="color:#28a745;"></i>
                    <span>Jogos</span>
                </div>
                <div class="app-item" onclick="abrirAppHub('prefeitura')">
                    <i class="fa-solid fa-city"></i>
                    <span>BJ Perdoes</span>
                </div>
                <div class="app-item" onclick="abrirAppHub('nostalgia')">
                    <i class="fa-solid fa-tv" style="color:#ff9800;"></i>
                    <span>Nostalgia</span>
                </div>
                <div class="app-item" onclick="abrirAppHub('video_call')">
                    <i class="fa-solid fa-video" style="color:#ff4b4b;"></i>
                    <span>Video Call</span>
                </div>
                <div class="app-item" onclick="ativarIAVibe()">
                    <i class="fa-solid fa-wand-magic-sparkles" style="color:#00e5ff;"></i>
                    <span>Vibe IA</span>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fotoInput" style="display:none;" accept="image/*">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="js/script.js"></script>
    <script src="app/ehub_logic.js"></script>
    <script src="app/nostalgia.js"></script>
    <script src="app/jogos.js"></script>
    <script src="js/gemini-ai.js"></script>

    <script>
        // Lógica da Interface Molecular
        function abrirMolecula() {
            document.getElementById('vibe-overlay-molecular').classList.add('ativo');
            // Puxa a foto do usuário do localStorage se existir
            const userNome = localStorage.getItem("vibe_user");
            if(userNome) {
                document.getElementById("img-nucleo").src = `https://ui-avatars.com/api/?name=${userNome}&background=101525&color=00e5ff`;
            }
        }

        function fecharMolecula(event) {
            // Fecha se clicar no fundo vazio (fora da molécula)
            if (event.target.id === 'vibe-overlay-molecular') {
                document.getElementById('vibe-overlay-molecular').classList.remove('ativo');
            }
        }

        function fecharMoleculaDireto() {
            // Função rápida para os botões fecharem a interface antes de abrirem o app
            document.getElementById('vibe-overlay-molecular').classList.remove('ativo');
        }

        // --- SEUS SCRIPTS ORIGINAIS INTACTOS ABAIXO ---
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        var swReg = null;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(function(reg) {
                    swReg = reg;
                    console.log('OIO: SW registrado');
                })
                .catch(function(e) {
                    console.log('OIO: SW erro', e);
                });
        }

        window.OioSom = {
            ctx: null,
            ativar: function() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            tocar: function(notas) {
                this.ativar();
                notas.forEach(function(item) {
                    var freq = item[0]; var delay = item[1];
                    var osc = window.OioSom.ctx.createOscillator();
                    var gain = window.OioSom.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, window.OioSom.ctx.currentTime + delay);
                    gain.gain.setValueAtTime(0.5, window.OioSom.ctx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.001, window.OioSom.ctx.currentTime + delay + 0.3);
                    osc.connect(gain); gain.connect(window.OioSom.ctx.destination);
                    osc.start(window.OioSom.ctx.currentTime + delay);
                    osc.stop(window.OioSom.ctx.currentTime + delay + 0.4);
                });
            },
            mensagem: function() { this.tocar([[880,0],[1100,0.2],[1320,0.4]]); },
            clique: function() { this.tocar([[660,0],[880,0.15]]); }
        };

        window.notificarVibe = function(titulo, corpo) {
            if (navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
            if (window.OioSom) window.OioSom.mensagem();
            if (Notification.permission === 'granted') {
                var reg = swReg;
                if (reg) {
                    reg.showNotification(titulo, {
                        body: corpo,
                        icon: './icon-192-1.png',
                        vibrate: [300,100,300,100,300],
                        tag: 'vibe-' + Date.now(),
                        renotify: true
                    });
                } else {
                    new Notification(titulo, { body: corpo, icon: './icon-192-1.png' });
                }
            }
        };

        document.addEventListener('touchstart', function() { window.OioSom.ativar(); }, { once: true });
        document.addEventListener('click', function() { window.OioSom.ativar(); }, { once: true });

        const btnEnviarAI = document.getElementById('btnEnviar');
        if (btnEnviarAI) {
            btnEnviarAI.addEventListener('click', async () => {
                const input = document.getElementById('msgInput');
                const msg = input.value.trim();
                
                if (msg.toLowerCase().startsWith('vibe ') || window.geminiAtiva) {
                    const pergunta = msg.toLowerCase().startsWith('vibe ') ? msg.substring(5) : msg;
                    window.geminiAtiva = false;
                    if (typeof obterRespostaIA === 'function') {
                        const resposta = await obterRespostaIA(pergunta);
                        window.notificarVibe('OIO ONE Inteligência', resposta);
                    }
                }
            });
        }
    </script>
</body>
</html>
