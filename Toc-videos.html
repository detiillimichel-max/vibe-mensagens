<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIO ONE - Vídeos</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos específicos para o App de Vídeos */
        body { background: radial-gradient(circle, #111, #000); padding-top: 20px; }
        .feed-videos { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .card-video { width: 90%; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 15px; }
        .video-player { width: 100%; border-radius: 15px; aspect-ratio: 9/16; background: #000; }
        .social-bar { display: flex; justify-content: space-around; padding-top: 15px; }
        .btn-social { background: none; border: none; color: white; font-size: 20px; }
    </style>
</head>
<body>

    <h2 style="color:#1a73e8; text-align:center;">Vibe Vídeos🚀</h2>

    <div id="feed" class="feed-videos">
        <div class="card-video">
            <div class="video-player"></div>
            <p style="color:white; margin:10px 0;">Legenda do Michel 😊🔥</p>
            <div class="social-bar">
                <button class="btn-social">❤️ Like</button>
                <button class="btn-social">💬 Comentar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="js/videos_logic.js"></script>

</body>
</html>
