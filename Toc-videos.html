<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toc Vídeos 🚀</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #000; color: white; overflow: hidden; }
        .feed-tiktok { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .card-video { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .controles-diretos { position: absolute; bottom: 80px; right: 20px; display: flex; flex-direction: column; gap: 20px; }
        .btn-acao { background: rgba(0,0,0,0.5); border: none; color: white; font-size: 30px; border-radius: 50%; width: 60px; height: 60px; }
        .btn-voltar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #00ffff; text-transform: uppercase; font-weight: bold; cursor: pointer; }
        .btn-novo { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); background: #00ffff; color: black; padding: 10px 30px; border-radius: 20px; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div id="feed" class="feed-tiktok">
        </div>

    <button class="btn-novo" onclick="document.getElementById('postVideo').click()">NOVO VÍDEO</button>
    <div class="btn-voltar" onclick="window.location.href='index.html'">VOLTAR</div>

    <input type="file" id="postVideo" style="display:none" accept="video/*">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="apps/jogos.js"></script> 
</body>
</html>
