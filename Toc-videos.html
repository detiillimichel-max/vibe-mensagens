<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe TikTok - OIO ONE</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Container Estilo TikTok (Scroll Vertical) */
        .vibe-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .video-section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Botão Voltar Azul Google */
        .btn-voltar {
            position: fixed; top: 20px; left: 20px;
            background: #4285F4; color: white; border: none;
            padding: 12px 20px; border-radius: 50px;
            font-weight: bold; z-index: 1000; cursor: pointer;
        }

        /* Overlay de Interação (Likes) */
        .side-bar {
            position: absolute; right: 15px; bottom: 100px;
            display: flex; flex-direction: column; gap: 25px; align-items: center;
        }
        .icon-btn { font-size: 30px; cursor: pointer; text-shadow: 2px 2px 5px #000; }
    </style>
</head>
<body>

    <button class="btn-voltar" onclick="window.location.href='index.html'">← VOLTAR</button>

    <div class="vibe-container" id="feed">
        
        <div class="video-section">
            <iframe src="https://www.youtube.com/embed/21X5lGlDOfg?autoplay=1&controls=0&modestbranding=1&loop=1" allow="autoplay"></iframe>
            <div class="side-bar">
                <div class="icon-btn" onclick="darLike('v1')">❤️</div>
                <div class="icon-btn" onclick="window.tocarSom('clique')">💬</div>
            </div>
        </div>

        <div class="video-section">
            <iframe src="https://archive.org/embed/classic_cartoons&autoplay=1" allow="autoplay"></iframe>
            <div class="side-bar">
                <div class="icon-btn" onclick="darLike('v2')">❤️</div>
                <div class="icon-btn" onclick="window.tocarSom('clique')">💬</div>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="apps/ehub_logic.js"></script>
</body>
</html>
