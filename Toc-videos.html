<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toc Vídeos - OIO ONE</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        .feed-tiktok { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .card-video { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Botão Voltar Azul Google */
        .btn-voltar { 
            position: absolute; top: 20px; left: 20px; 
            background: #4285F4; color: white; 
            padding: 10px 20px; border-radius: 50px; 
            font-weight: bold; text-decoration: none;
            z-index: 100; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Botão Novo Vídeo Central */
        .btn-novo { 
            position: absolute; bottom: 30px; left: 50%; 
            transform: translateX(-50%); background: #00ffff; 
            color: black; padding: 12px 30px; border-radius: 30px; 
            font-weight: bold; border: none; z-index: 100;
        }

        /* Área de Curtida (Emoji Nativo) */
        .area-social { 
            position: absolute; right: 20px; bottom: 100px; 
            display: flex; flex-direction: column; align-items: center; gap: 5px; 
        }
        .btn-like { background: none; border: none; font-size: 35px; cursor: pointer; }
        .count-like { font-size: 14px; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

    <button class="btn-voltar" onclick="window.location.href='index.html'">
        ← VOLTAR
    </button>

    <div id="feed" class="feed-tiktok">
        <div class="card-video">
            <video src="" loop muted onclick="this.paused ? this.play() : this.pause()"></video>
            <div class="area-social">
                <button class="btn-like" onclick="darLike('video1')">❤️</button>
                <span class="count-like">0</span>
            </div>
        </div>
    </div>

    <button class="btn-novo" onclick="document.getElementById('postVideo').click()">
        + NOVO VÍDEO
    </button>

    <input type="file" id="postVideo" style="display:none" accept="video/*">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="apps/ehub_logic.js"></script>
</body>
</html>
